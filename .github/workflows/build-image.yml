name: Build V.E.D.A. USB Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-utils parted dosfstools e2fsprogs

      - name: Create bootable image
        run: |
          sudo bash packer/build-image.sh

      - name: Compress image
        run: |
          xz -9 -T0 veda.img
          ls -lh veda.img.xz

      - name: Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: veda.img.xz
          body: |
            ## V.E.D.A. — Vedic Education & Data Archive

            Bootable USB image with offline AI search over Srila Prabhupada's books.

            ### How to use
            1. Download `veda.img.xz`
            2. Decompress: `xz -d veda.img.xz`
            3. Flash to USB SSD with [balenaEtcher](https://etcher.balena.io/)
            4. Boot any PC from USB
            5. Open http://localhost:8080

            ### Requirements
            - 16 GB RAM on host PC
            - 32 GB USB SSD
