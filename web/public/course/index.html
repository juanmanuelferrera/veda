<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de Bhakti Yoga — V.E.D.A.</title>
    <style>
        :root { --bg: #0f0c08; --card: #1a1610; --border: rgba(201,168,76,0.15); --gold: #c9a84c; --gold-light: #e8d48b; --text: #e8e0d4; --muted: #a89b8a; --green: #22c55e; --red: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        header { text-align: center; padding: 2rem 0 1rem; }
        header h1 { font-size: 1.8rem; color: var(--gold); margin-bottom: 0.25rem; }
        header p { color: var(--muted); font-size: 0.85rem; }
        .back-link { color: var(--gold); text-decoration: none; font-size: 0.8rem; }
        .back-link:hover { color: var(--gold-light); }

        /* Progress bar */
        .progress-bar { background: rgba(255,255,255,0.05); border-radius: 8px; height: 8px; margin: 1.5rem 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); border-radius: 8px; transition: width 0.5s; }
        .progress-text { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 1rem; }

        /* Unit cards */
        .units { display: grid; gap: 1rem; }
        .unit-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 1rem; }
        .unit-card:hover { border-color: var(--gold); transform: translateY(-2px); }
        .unit-num { font-size: 1.5rem; font-weight: 700; color: var(--gold); width: 40px; text-align: center; }
        .unit-info { flex: 1; }
        .unit-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.25rem; }
        .unit-meta { font-size: 0.75rem; color: var(--muted); }
        .unit-score { font-size: 0.8rem; padding: 0.25rem 0.75rem; border-radius: 20px; }
        .score-none { background: rgba(255,255,255,0.05); color: var(--muted); }
        .score-pass { background: rgba(34,197,94,0.15); color: var(--green); }
        .score-fail { background: rgba(239,68,68,0.15); color: var(--red); }

        /* Lesson view */
        .lesson-view { display: none; }
        .lesson-view.active { display: block; }
        .lesson-content { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; line-height: 1.9; font-size: 0.95rem; }
        .lesson-content p { margin-bottom: 1rem; }
        .lesson-title { font-size: 1.3rem; color: var(--gold); font-weight: 600; margin-bottom: 1.5rem; }
        .btn-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: center; }
        .btn { padding: 0.6rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: var(--gold); color: var(--bg); }
        .btn-primary:hover { background: var(--gold-light); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
        .btn-secondary:hover { color: var(--text); border-color: var(--gold); }

        /* Quiz */
        .quiz-view { display: none; }
        .quiz-view.active { display: block; }
        .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        .q-num { font-size: 0.75rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .q-text { font-size: 1rem; margin-bottom: 1rem; line-height: 1.6; }
        .option { display: block; width: 100%; text-align: left; padding: 0.75rem 1rem; margin-bottom: 0.5rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .option:hover { border-color: var(--gold); }
        .option.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }
        .option.correct { border-color: var(--green); background: rgba(34,197,94,0.1); color: var(--green); }
        .option.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); color: var(--red); }
        .option:disabled { cursor: default; }

        .quiz-result { text-align: center; padding: 2rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-top: 1rem; }
        .result-score { font-size: 2.5rem; font-weight: 700; }
        .result-label { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }

        .lang-toggle { display: flex; justify-content: center; gap: 0.5rem; margin: 1rem 0; font-size: 0.8rem; }
        .lang-btn { padding: 0.3rem 0.75rem; border-radius: 4px; cursor: pointer; background: none; border: 1px solid var(--border); color: var(--muted); }
        .lang-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <a href="../" class="back-link">&larr; V.E.D.A.</a>
        <h1 id="courseTitle">Curso de Bhakti Yoga</h1>
        <p>Facilitador: Jagannatha Mishra Dasa</p>
        <div class="lang-toggle">
            <button class="lang-btn active" id="lang-es" onclick="setLang('es')">ES</button>
            <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 10 unidades completadas</div>

    <!-- Unit list -->
    <div id="unitList" class="units"></div>

    <!-- Lesson view -->
    <div id="lessonView" class="lesson-view">
        <div class="lesson-title" id="lessonTitle"></div>
        <div class="lesson-content" id="lessonContent"></div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="showUnits()">Volver</button>
            <button class="btn btn-primary" id="quizBtn" onclick="showQuiz()">Prueba</button>
        </div>
    </div>

    <!-- Quiz view -->
    <div id="quizView" class="quiz-view">
        <div class="lesson-title" id="quizTitle"></div>
        <div id="quizQuestions"></div>
        <div id="quizResult" class="quiz-result" style="display:none">
            <div class="result-score" id="resultScore"></div>
            <div class="result-label" id="resultLabel"></div>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="showLesson(currentUnit)">Volver a la lección</button>
            <button class="btn btn-primary" id="submitQuiz" onclick="submitQuiz()">Enviar respuestas</button>
        </div>
    </div>
</div>

<script>
var courseData = [];
var currentUnit = 0;
var userAnswers = {};
var scores = JSON.parse(localStorage.getItem('veda_course_scores') || '{}');
var lang = localStorage.getItem('veda_course_lang') || 'en';

function setLang(l) {
    lang = l;
    localStorage.setItem('veda_course_lang', l);
    document.getElementById('lang-es').classList.toggle('active', l === 'es');
    document.getElementById('lang-en').classList.toggle('active', l === 'en');
    document.getElementById('courseTitle').textContent = l === 'es' ? 'Curso de Bhakti Yoga' : 'Bhakti Yoga Course';
    document.getElementById('progressText').textContent = getProgressText();
    // Re-render current view (not quiz — quiz stays in its original language)
    if (document.getElementById('lessonView').classList.contains('active')) {
        showLesson(currentUnit);
    } else if (!document.getElementById('quizView').classList.contains('active')) {
        renderUnits();
    }
}

function t(obj, field) {
    // Get translated field, fallback to Spanish
    var en = obj[field + '_en'];
    if (lang === 'en' && en && en.length > 0) return en;
    return obj[field + '_es'] || '';
}

function getProgressText() {
    var completed = Object.keys(scores).length;
    if (lang === 'en') return completed + ' / ' + courseData.length + ' units completed';
    return completed + ' / ' + courseData.length + ' unidades completadas';
}

async function loadCourse() {
    var res = await fetch('course-data.json');
    courseData = await res.json();
    renderUnits();
}

function renderUnits() {
    var list = document.getElementById('unitList');
    list.innerHTML = '';
    var completed = 0;

    courseData.forEach(function(unit, i) {
        var score = scores['unit_' + unit.unit];
        var scoreHtml = '';
        if (score !== undefined) {
            completed++;
            var pct = Math.round(score);
            if (pct >= 70) {
                scoreHtml = '<span class="unit-score score-pass">' + pct + '%</span>';
            } else {
                scoreHtml = '<span class="unit-score score-fail">' + pct + '%</span>';
            }
        } else {
            scoreHtml = '<span class="unit-score score-none">Pendiente</span>';
        }

        var qCount = unit.quiz ? unit.quiz.questions.length : 0;
        var lessonLabel = lang === 'en' ? ' lesson · ' : ' lección · ';
        var qLabel = lang === 'en' ? ' questions' : ' preguntas';
        var pendingLabel = lang === 'en' ? 'Pending' : 'Pendiente';
        var card = document.createElement('div');
        card.className = 'unit-card';
        card.onclick = function() { showLesson(i); };
        card.innerHTML =
            '<div class="unit-num">' + unit.unit + '</div>' +
            '<div class="unit-info">' +
                '<div class="unit-title">' + t(unit, 'title') + '</div>' +
                '<div class="unit-meta">' + unit.lessons.length + lessonLabel + qCount + qLabel + '</div>' +
            '</div>' +
            scoreHtml;
        list.appendChild(card);
    });

    var pct = Math.round((completed / courseData.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = completed + ' / ' + courseData.length + ' unidades completadas';
}

function showUnits() {
    document.getElementById('unitList').style.display = 'grid';
    document.getElementById('lessonView').classList.remove('active');
    document.getElementById('quizView').classList.remove('active');
    document.querySelector('.lang-toggle').style.display = 'flex';
    renderUnits();
}

function showLesson(idx) {
    currentUnit = idx;
    var unit = courseData[idx];
    document.getElementById('unitList').style.display = 'none';
    document.getElementById('quizView').classList.remove('active');
    document.getElementById('lessonView').classList.add('active');
    document.querySelector('.lang-toggle').style.display = 'flex';

    var unitLabel = lang === 'en' ? 'Unit ' : 'Unidad ';
    document.getElementById('lessonTitle').textContent = unitLabel + unit.unit + ': ' + t(unit, 'title');

    var content = '';
    unit.lessons.forEach(function(lesson) {
        var text = t(lesson, 'content');
        if (!text) text = lesson.content_es || '';
        var paragraphs = text.split('\n\n');
        paragraphs.forEach(function(p) {
            p = p.trim();
            if (p) content += '<p>' + p.replace(/\n/g, '<br>') + '</p>';
        });
    });
    document.getElementById('lessonContent').innerHTML = content;
    document.getElementById('quizBtn').style.display = unit.quiz ? 'inline-block' : 'none';
    setTimeout(function() { window.scrollTo({ top: 0, behavior: 'instant' }); }, 50);
}

function showQuiz() {
    var unit = courseData[currentUnit];
    if (!unit.quiz) return;

    document.getElementById('lessonView').classList.remove('active');
    document.getElementById('quizView').classList.add('active');
    document.querySelector('.lang-toggle').style.display = 'none';
    document.getElementById('quizTitle').textContent = (lang === 'en' ? 'Quiz ' : 'Prueba ') + unit.unit;
    document.getElementById('quizResult').style.display = 'none';
    document.getElementById('submitQuiz').style.display = 'inline-block';
    userAnswers = {};

    var container = document.getElementById('quizQuestions');
    container.innerHTML = '';

    unit.quiz.questions.forEach(function(q, qi) {
        var card = document.createElement('div');
        card.className = 'question-card';
        card.id = 'q-' + qi;

        var optionsHtml = '';
        var letters = ['A', 'B', 'C', 'D'];
        var options = (lang === 'en' && q.options_en) ? q.options_en : q.options_es;
        options.forEach(function(opt, oi) {
            optionsHtml += '<button class="option" data-q="' + qi + '" data-o="' + oi + '" onclick="selectOption(' + qi + ',' + oi + ')">' +
                letters[oi] + '. ' + opt + '</button>';
        });

        var qLabel = lang === 'en' ? 'Question ' : 'Pregunta ';
        card.innerHTML = '<div class="q-num">' + qLabel + q.id + '</div>' +
            '<div class="q-text">' + t(q, 'q') + '</div>' +
            optionsHtml;
        container.appendChild(card);
    });

    setTimeout(function() { window.scrollTo({ top: 0, behavior: 'instant' }); }, 50);
}

function selectOption(qi, oi) {
    userAnswers[qi] = oi;
    var btns = document.querySelectorAll('#q-' + qi + ' .option');
    btns.forEach(function(b) { b.classList.remove('selected'); });
    btns[oi].classList.add('selected');
}

function submitQuiz() {
    var unit = courseData[currentUnit];
    var questions = unit.quiz.questions;
    var correct = 0;

    questions.forEach(function(q, qi) {
        var btns = document.querySelectorAll('#q-' + qi + ' .option');
        btns.forEach(function(b) { b.disabled = true; });

        var userAns = userAnswers[qi];
        var correctAns = q.answer;

        if (userAns !== undefined) {
            if (userAns === correctAns) {
                btns[userAns].classList.add('correct');
                correct++;
            } else {
                btns[userAns].classList.add('wrong');
                btns[correctAns].classList.add('correct');
            }
        } else {
            btns[correctAns].classList.add('correct');
        }
    });

    var pct = (correct / questions.length) * 100;
    scores['unit_' + unit.unit] = pct;
    localStorage.setItem('veda_course_scores', JSON.stringify(scores));

    var resultEl = document.getElementById('quizResult');
    resultEl.style.display = 'block';
    document.getElementById('resultScore').textContent = correct + ' / ' + questions.length;
    document.getElementById('resultScore').style.color = pct >= 70 ? 'var(--green)' : 'var(--red)';
    document.getElementById('resultLabel').textContent = pct >= 70 ? (lang === 'en' ? 'Passed' : 'Aprobado') : (lang === 'en' ? 'Keep studying' : 'Sigue estudiando');
    document.getElementById('submitQuiz').style.display = 'none';
    window.scrollTo(0, document.body.scrollHeight);
}

loadCourse();
// Apply saved language
document.getElementById('lang-' + lang).classList.add('active');
document.getElementById('lang-' + (lang === 'es' ? 'en' : 'es')).classList.remove('active');
</script>
</body>
</html>
